<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            opacity: 0.98;
        }
        .msg-bubble .msg-actions { display: none; }
        .msg-bubble:hover .msg-actions { display: flex; }
    </style>
</head>
<body class="bg-gray-200 h-screen flex items-center justify-center font-sans antialiased">

    <div id="auth-screen" class="fixed inset-0 bg-[#00a884] flex flex-col items-center justify-center z-50 transition-all duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full mx-4">
            <div class="w-16 h-16 bg-[#00a884] rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                <i class="fa-brands fa-whatsapp text-4xl text-white"></i>
            </div>
            <h2 id="auth-title" class="text-2xl font-bold text-gray-800 text-center mb-6">Login to WhatsApp</h2>
            <div class="space-y-4">
                <div id="username-field-wrapper" class="hidden">
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Username</label>
                    <input type="text" id="auth-username" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-[#00a884]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Email Address</label>
                    <input type="email" id="auth-email" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-[#00a884]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                    <div class="relative flex items-center">
                        <input type="password" id="auth-password" class="w-full border border-gray-300 rounded-lg pl-3 pr-10 py-2 outline-none focus:border-[#00a884]">
                        <button type="button" id="password-toggle-btn" class="absolute right-3 text-gray-400 hover:text-gray-600 cursor-pointer">
                            <i id="password-toggle-icon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button id="auth-submit-btn" class="w-full bg-[#00a884] text-white font-semibold py-2.5 rounded-lg hover:bg-[#008f72] cursor-pointer shadow-md transition-colors">Sign In</button>
            </div>
            <div class="text-center mt-6 text-sm text-gray-500">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button id="auth-toggle-btn" class="text-[#00a884] font-semibold underline ml-1 cursor-pointer">Register here</button>
            </div>
        </div>
    </div>

    <div class="w-full h-full md:w-[95vw] md:h-[95vh] bg-white flex shadow-2xl rounded-lg overflow-hidden">
        
        <div class="w-1/3 border-r border-gray-300 flex flex-col bg-white min-w-[340px]">
            <div class="h-16 bg-[#f0f2f5] flex items-center justify-between px-4 py-2 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <img id="my-avatar" src="" class="w-10 h-10 rounded-full bg-gray-300 hidden">
                    <div class="flex flex-col">
                        <span id="my-name" class="font-semibold text-gray-700 text-sm">Validating Auth...</span>
                        <button onclick="logout()" class="text-left text-xs text-red-500 hover:underline cursor-pointer">Log Out</button>
                    </div>
                </div>
            </div>

            <div id="group-chat-tab" onclick="switchChat('global', 'Public Chat', 'https://api.dicebear.com/7.x/identicon/svg?seed=publicroom', 'group')" class="flex items-center gap-3 px-4 py-3 hover:bg-[#f0f2f5] cursor-pointer border-b border-gray-200">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=publicroom" class="w-12 h-12 rounded-full">
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-gray-900 truncate">Public Chat</h3>
                </div>
            </div>

            <div class="bg-white px-4 py-2 border-b border-gray-100">
                <span class="text-xs font-bold text-gray-500 tracking-wider uppercase">Active Contacts</span>
            </div>
            <div class="flex-1 overflow-y-auto" id="users-list"></div>
        </div>

        <div class="w-2/3 flex flex-col relative bg-[#f0f2f5]">
            
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[#f0f2f5]">
                <div class="w-48 h-48 mb-6 text-gray-300 flex items-center justify-center">
                    <i class="fa-brands fa-whatsapp text-9xl"></i>
                </div>
                <h1 class="text-3xl font-light text-gray-600 mb-2">WhatsApp Web Pro</h1>
                <p class="text-sm text-gray-500 max-w-md text-center">Send and receive messages without keeping your phone online.<br>Select a chat from the sidebar to start messaging.</p>
            </div>

            <div id="active-chat-ui" class="hidden flex-col h-full w-full">
                <div class="h-16 bg-[#f0f2f5] flex items-center justify-between px-4 py-2 border-b border-gray-200">
                    <div class="flex items-center gap-3">
                        <img id="target-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=publicroom" class="w-10 h-10 rounded-full">
                        <div>
                            <h3 id="target-title" class="font-semibold text-gray-800 text-sm">Public Chat</h3>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto px-8 py-4 chat-bg flex flex-col gap-2" id="msg-box"></div>

                <div class="h-16 bg-[#f0f2f5] flex items-center px-4 py-2 gap-4 border-t border-gray-200">
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('image-upload').click()" class="text-gray-500 hover:text-gray-700 text-xl cursor-pointer">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    
                    <form id="input-form" class="flex-1 flex gap-4 items-center">
                        <input type="text" id="raw-message" autocomplete="off" placeholder="Type a message" class="flex-1 bg-white outline-none rounded-lg py-2 px-4 text-sm text-gray-700 shadow-xs">
                        <button type="submit" class="bg-transparent text-gray-600 hover:text-emerald-600 text-xl p-1 cursor-pointer">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let isLoginMode = true;
        let myProfile = null; 
        let activeChatId = null; // Starts as null now!
        let activeChatType = null; 
        let cachedCredentials = null; 
        let selectedImageBase64 = null; // Holds the image data

        const authScreen = document.getElementById('auth-screen');
        const authTitle = document.getElementById('auth-title');
        const usernameFieldWrapper = document.getElementById('username-field-wrapper');
        const authUsernameInput = document.getElementById('auth-username');
        const authEmailInput = document.getElementById('auth-email');
        const authPasswordInput = document.getElementById('auth-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authToggleText = document.getElementById('auth-toggle-text');
        const passwordToggleBtn = document.getElementById('password-toggle-btn');
        const passwordToggleIcon = document.getElementById('password-toggle-icon');

        const msgBox = document.getElementById('msg-box');
        const usersList = document.getElementById('users-list');
        const targetTitle = document.getElementById('target-title');
        const targetAvatar = document.getElementById('target-avatar');

        passwordToggleBtn.addEventListener('click', () => {
            if (authPasswordInput.type === 'password') {
                authPasswordInput.type = 'text';
                passwordToggleIcon.className = 'fa-solid fa-eye-slash';
            } else {
                authPasswordInput.type = 'password';
                passwordToggleIcon.className = 'fa-solid fa-eye';
            }
        });

        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.textContent = "Login to WhatsApp";
                authSubmitBtn.textContent = "Sign In";
                authToggleText.textContent = "Don't have an account?";
                authToggleBtn.textContent = "Register here";
                usernameFieldWrapper.classList.add('hidden');
            } else {
                authTitle.textContent = "Create Account";
                authSubmitBtn.textContent = "Sign Up";
                authToggleText.textContent = "Already have an account?";
                authToggleBtn.textContent = "Login here";
                usernameFieldWrapper.classList.remove('hidden');
            }
        });

        authSubmitBtn.addEventListener('click', () => {
            const email = authEmailInput.value.trim();
            const password = authPasswordInput.value.trim();
            if(!email || !password) return alert("Please fill in authentication inputs.");

            if (isLoginMode) {
                cachedCredentials = { email, password };
                socket.emit('auth-login', { email, password });
            } else {
                const username = authUsernameInput.value.trim();
                if(!username) return alert("Please specify username.");
                cachedCredentials = { email, password };
                socket.emit('auth-signup', { username, email, password });
            }
        });

        socket.on('auth-error', (errorMsg) => {
            localStorage.removeItem('wa_user_auth');
            alert(errorMsg);
        });

        socket.on('auth-success', (userObject) => {
            myProfile = userObject;
            if(cachedCredentials) {
                localStorage.setItem('wa_user_auth', JSON.stringify(cachedCredentials));
            }

            authScreen.classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('my-name').textContent = `${myProfile.username}`;
            const myAvatar = document.getElementById('my-avatar');
            myAvatar.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${myProfile.username}`;
            myAvatar.classList.remove('hidden');
            
            // Notice: We don't automatically call switchChat here anymore! 
            // We just let the user see the empty state.
        });

        window.addEventListener('load', () => {
            const savedSession = localStorage.getItem('wa_user_auth');
            if (savedSession) {
                const creds = JSON.parse(savedSession);
                authTitle.textContent = "Syncing Session...";
                socket.emit('auth-login', { email: creds.email, password: creds.password });
            }
        });

        window.logout = function() {
            localStorage.removeItem('wa_user_auth');
            window.location.reload();
        }

        socket.on('connect', () => {
            const savedSession = localStorage.getItem('wa_user_auth');
            if (savedSession && myProfile) {
                const creds = JSON.parse(savedSession);
                socket.emit('auth-login', { email: creds.email, password: creds.password });
            }
        });

        function getTimeString() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        window.deleteForMe = function(msgId) {
            if(confirm("Delete message for ME?")) {
                socket.emit('delete-msg-for-me', msgId);
            }
        }
        window.deleteForEveryone = function(msgId) {
            if(confirm("Delete message for EVERYONE?")) {
                socket.emit('delete-msg-everyone', msgId);
            }
        }

        // 🔥 Image Upload Logic
        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            // Limit to ~2MB just so we don't crash the Node.js socket
            if(file.size > 2 * 1024 * 1024) return alert('Image too large. Please select an image under 2MB.');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result;
                document.getElementById('raw-message').placeholder = "📷 Image attached! Type a caption...";
                document.getElementById('raw-message').focus();
            };
            reader.readAsDataURL(file);
        });

        // Core Render Engine (Now supports Images)
        function appendBubble(msgId, senderName, text, imageUrl, time, isSentByMe) {
            const wrapper = document.createElement('div');
            wrapper.id = `msg-${msgId}`;
            wrapper.className = isSentByMe 
                ? "msg-bubble self-end bg-[#d9fdd3] text-[#111b21] max-w-[65%] rounded-lg px-3 py-2 shadow-xs relative flex flex-col min-w-[120px]"
                : "msg-bubble self-start bg-white text-[#111b21] max-w-[65%] rounded-lg px-3 py-2 shadow-xs relative flex flex-col min-w-[120px]";

            const showSenderHeader = !isSentByMe && activeChatType === 'group' 
                ? `<span class="text-xs font-bold text-[#00a884] block mb-0.5">${senderName}</span>` 
                : '';
            
            const menuHtml = `
                <div class="msg-actions absolute -top-3 right-1 flex items-center gap-1 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-md z-10">
                    ${isSentByMe ? `<button onclick="deleteForEveryone('${msgId}')" title="Delete for Everyone" class="text-gray-500 hover:text-red-500 text-sm cursor-pointer mx-1"><i class="fa-solid fa-users-slash"></i></button>` : ''}
                    <button onclick="deleteForMe('${msgId}')" title="Delete for Me" class="text-gray-500 hover:text-orange-500 text-sm cursor-pointer mx-1"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;

            // Render Image if it exists
            const imgHtml = imageUrl ? `<img src="${imageUrl}" class="w-full max-h-64 object-cover rounded-md mt-1 mb-2 border border-gray-200">` : '';

            wrapper.innerHTML = `
                ${menuHtml}
                ${showSenderHeader}
                ${imgHtml}
                ${text ? `<p class="text-sm break-words pr-4 pb-2 mt-1">${text}</p>` : '<div class="pb-4"></div>'}
                <span class="text-[10px] text-gray-400 absolute bottom-1 right-2 flex items-center gap-1 select-none bg-white/50 px-1 rounded">
                    ${time} ${isSentByMe ? '<i class="fa-solid fa-check-double text-sky-400"></i>':''}
                </span>
            `;
            msgBox.appendChild(wrapper);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        socket.on('load-history', (historyLogs) => {
            msgBox.innerHTML = '';
            historyLogs.forEach(msg => {
                const isMe = msg.sender === myProfile._id;
                appendBubble(msg._id, msg.senderName, msg.text, msg.imageUrl, msg.time, isMe);
            });
        });

        socket.on('message-deleted', (msgId) => {
            const el = document.getElementById(`msg-${msgId}`);
            if(el) el.remove();
        });

        function switchChat(chatId, displayName, avatarUrl, type) {
            // Hide Empty State & Show Chat UI
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-chat-ui').classList.remove('hidden');
            document.getElementById('active-chat-ui').classList.add('flex');

            activeChatId = chatId; 
            activeChatType = type;

            targetTitle.textContent = displayName;
            targetAvatar.src = avatarUrl;

            document.querySelectorAll('[data-chat-tab]').forEach(el => el.classList.remove('bg-[#e9edef]'));
            
            if(chatId === 'global') {
                document.getElementById('group-chat-tab').classList.add('bg-[#e9edef]');
                if(myProfile) socket.emit('get-chat-history', { chatType: 'group' });
            } else {
                document.getElementById('group-chat-tab').classList.remove('bg-[#e9edef]');
                const activeTab = document.getElementById(`tab-${chatId}`);
                if(activeTab) activeTab.classList.add('bg-[#e9edef]');
                if(myProfile) socket.emit('get-chat-history', { chatType: 'private', targetDbId: chatId });
            }
        }

        socket.on('update-user-list', (onlineUsersArray) => {
            usersList.innerHTML = '';
            const renderedUsers = new Set();

            onlineUsersArray.forEach(user => {
                if (user.dbId === myProfile?._id || renderedUsers.has(user.dbId)) return;
                renderedUsers.add(user.dbId);

                const userTab = document.createElement('div');
                userTab.id = `tab-${user.dbId}`;
                userTab.setAttribute('data-chat-tab', '');
                userTab.className = `flex items-center gap-3 px-4 py-3 hover:bg-[#f0f2f5] cursor-pointer border-b border-gray-100 ${activeChatId === user.dbId ? 'bg-[#e9edef]' : ''}`;
                userTab.onclick = () => switchChat(user.dbId, user.username, user.avatar, 'private');

                userTab.innerHTML = `
                    <img src="${user.avatar}" class="w-12 h-12 rounded-full bg-gray-100">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <h3 class="font-medium text-gray-900 truncate">${user.username}</h3>
                        </div>
                        <p class="text-xs text-emerald-500 font-medium">🟢 Active Online</p>
                    </div>
                `;
                usersList.appendChild(userTab);
            });
        });

        document.getElementById('input-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputField = document.getElementById('raw-message');
            const text = inputField.value.trim();
            
            // Allow sending if there's EITHER text OR an image attached
            if(!text && !selectedImageBase64) return;
            if(!myProfile || !activeChatId) return;

            const time = getTimeString();
            const payload = { text, imageUrl: selectedImageBase64, time };

            if (activeChatType === 'group') {
                socket.emit('send-group-msg', payload);
            } else {
                payload.targetDbId = activeChatId;
                socket.emit('send-private-msg', payload);
            }

            // Reset inputs after sending
            inputField.value = '';
            inputField.placeholder = "Type a message";
            selectedImageBase64 = null;
            document.getElementById('image-upload').value = '';
            inputField.focus();
        });

        socket.on('receive-group-msg', (data) => {
            if(activeChatId === 'global') {
                const isMe = data.sender === myProfile._id;
                appendBubble(data._id, data.senderName, data.text, data.imageUrl, data.time, isMe);
            }
        });

        socket.on('receive-private-msg', (data) => {
            if(activeChatId === data.sender || activeChatId === data.recipient) {
                const isMe = data.sender === myProfile._id;
                appendBubble(data._id, data.senderName, data.text, data.imageUrl, data.time, isMe);
            }
        });
    </script>
</body>
</html>
